{{- $p := .Paginator -}}
{{- if gt $p.TotalPages 1 -}}
<nav class="navigation pagination" role="navigation">
  <h2 class="screen-reader-text">Nawigacja po wpisach</h2>
  <div class="nav-links">
    {{- if $p.HasPrev }}<a class="prev page-numbers" href="{{ $p.Prev.URL }}">&laquo; Poprzednie</a>{{ end -}}
    {{- range $p.Pagers -}}
      {{- if eq . $p -}}
        <span aria-current="page" class="page-numbers current">{{ .PageNumber }}</span>
      {{- else -}}
        <a class="page-numbers" href="{{ .URL }}">{{ .PageNumber }}</a>
      {{- end -}}
    {{- end -}}
    {{- if $p.HasNext }}<a class="next page-numbers" href="{{ $p.Next.URL }}">Następne &raquo;</a>{{ end -}}
  </div>
</nav>
{{- end -}}
